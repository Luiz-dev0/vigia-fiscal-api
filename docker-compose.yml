services:
  postgres:
    image: postgres:16-alpine
    container_name: vigia-fiscal-db
    environment:
      POSTGRES_DB: vigiafiscal
      POSTGRES_USER: vigiafiscal
      POSTGRES_PASSWORD: Vf@9mXkR2#qLpT7z
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigiafiscal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: