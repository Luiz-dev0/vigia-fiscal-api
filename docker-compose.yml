services:
  postgres:
    image: postgres:16-alpine
    container_name: nfe-monitor-db
    environment:
      POSTGRES_DB: nfemonitor
      POSTGRES_USER: nfemonitor
      POSTGRES_PASSWORD: Vf@9mXkR2#qLpT7z
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfemonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8081:8080"
    environment:
      AUTHENTICATION_API_KEY: nfemonitor-evolution-key-local
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://nfemonitor:nfemonitor123@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution-api
      REDIS_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035637479"
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  evolution_data: